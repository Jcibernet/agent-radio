<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256" role="img" aria-label="agent-radio — file-backed bus for coding agents">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#070A18"/>
      <stop offset="0.52" stop-color="#0B1120"/>
      <stop offset="1" stop-color="#030712"/>
    </linearGradient>

    <radialGradient id="aura" cx="50%" cy="32%" r="60%">
      <stop offset="0" stop-color="#FBBF24" stop-opacity="0.28"/>
      <stop offset="0.42" stop-color="#38BDF8" stop-opacity="0.08"/>
      <stop offset="1" stop-color="#0B1120" stop-opacity="0"/>
    </radialGradient>

    <linearGradient id="amber" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FFF7AD"/>
      <stop offset="0.48" stop-color="#FBBF24"/>
      <stop offset="1" stop-color="#D97706"/>
    </linearGradient>

    <linearGradient id="steel" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#F8FAFC"/>
      <stop offset="0.62" stop-color="#94A3B8"/>
      <stop offset="1" stop-color="#475569"/>
    </linearGradient>

    <linearGradient id="rail" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#38BDF8"/>
      <stop offset="0.5" stop-color="#34D399"/>
      <stop offset="1" stop-color="#FB7185"/>
    </linearGradient>

    <filter id="glowAmber" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <pattern id="grid" width="18" height="18" patternUnits="userSpaceOnUse">
      <path d="M18 0H0V18" fill="none" stroke="#172554" stroke-width="1" opacity="0.28"/>
    </pattern>

    <pattern id="scan" width="4" height="4" patternUnits="userSpaceOnUse">
      <rect width="4" height="1.6" fill="#000" opacity="0.12"/>
    </pattern>
  </defs>

  <!-- badge -->
  <rect width="256" height="256" rx="54" fill="url(#bg)"/>
  <rect width="256" height="256" rx="54" fill="url(#grid)" opacity="0.72"/>
  <rect x="4" y="4" width="248" height="248" rx="50" fill="none" stroke="#FBBF24" stroke-width="2.8" opacity="0.88"/>
  <rect x="10" y="10" width="236" height="236" rx="44" fill="none" stroke="#38BDF8" stroke-width="1.15" opacity="0.32"/>
  <circle cx="128" cy="82" r="88" fill="url(#aura)"/>

  <!-- broadcast arcs -->
  <g fill="none" stroke-linecap="round" filter="url(#glowAmber)">
    <path d="M106 91 A25 25 0 0 1 106 57" stroke="url(#amber)" stroke-width="8"/>
    <path d="M93 103 A43 43 0 0 1 93 45" stroke="#FBBF24" stroke-width="6" opacity="0.72"/>
    <path d="M79 115 A62 62 0 0 1 79 33" stroke="#FBBF24" stroke-width="4.5" opacity="0.42"/>
    <path d="M150 91 A25 25 0 0 0 150 57" stroke="url(#amber)" stroke-width="8"/>
    <path d="M163 103 A43 43 0 0 0 163 45" stroke="#FBBF24" stroke-width="6" opacity="0.72"/>
    <path d="M177 115 A62 62 0 0 0 177 33" stroke="#FBBF24" stroke-width="4.5" opacity="0.42"/>
  </g>

  <!-- beacon -->
  <g filter="url(#glowAmber)">
    <circle cx="128" cy="74" r="18" fill="#FBBF24" opacity="0.20"/>
    <circle cx="128" cy="74" r="9.5" fill="url(#amber)"/>
    <circle cx="128" cy="74" r="3.5" fill="#FFF7AD" opacity="0.95"/>
  </g>

  <!-- mast + guy wires -->
  <g stroke-linecap="round" stroke-linejoin="round">
    <path d="M128 91V178" stroke="url(#steel)" stroke-width="9"/>
    <path d="M128 120L96 178" stroke="#64748B" stroke-width="6"/>
    <path d="M128 120L160 178" stroke="#64748B" stroke-width="6"/>
    <path d="M112 178H144" stroke="#CBD5E1" stroke-width="5" opacity="0.9"/>
  </g>

  <!-- local filesystem rail -->
  <g filter="url(#softGlow)">
    <path d="M70 194H186" stroke="url(#rail)" stroke-width="5" stroke-linecap="round" opacity="0.85"/>
    <path d="M82 208H174" stroke="#334155" stroke-width="5" stroke-linecap="round" opacity="0.95"/>
    <rect x="72" y="185" width="23" height="23" rx="7" fill="#38BDF8"/>
    <rect x="116.5" y="185" width="23" height="23" rx="7" fill="#34D399"/>
    <rect x="161" y="185" width="23" height="23" rx="7" fill="#FB7185"/>
    <path d="M95 196.5H116.5M139.5 196.5H161" stroke="#FBBF24" stroke-width="2.6" stroke-linecap="round" opacity="0.65"/>
  </g>

  <!-- append-only file marks -->
  <g fill="none" stroke="#94A3B8" stroke-width="2" opacity="0.58" stroke-linecap="round">
    <path d="M74 224H182"/>
    <path d="M90 232H166" opacity="0.72"/>
  </g>

  <rect width="256" height="256" rx="54" fill="url(#scan)"/>
</svg>
